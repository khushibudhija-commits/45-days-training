<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style3.css" />
  </head>
  <body class="fullbody">
    <div clas="box">
    <header class="container">
      <h1 class="heading">Need any Help? Get in touch</h1>
      <p class="paragraph">Open a ticket,we will get back to you ASAP✋</p>
    </header>
    <section class="centersection">
      <form  action="#" method="post">
        <div clas="name">
        <div class="div1">
        <label class="label1" for="firstname">First Name:</label>
        <input
          class="input1"
          type="text"
          name="firstname"
          id="firstname"
          placeholder="First Name"></div>
          <div class="div2">
        <label class="label2" for="lastname">Last Name:</label>
        <input
          class="input2"
          type="text"
          name="lastname"
          id="lastname"
          placeholder="Last Name"
        /></div></div>
        <div class="div3">
        <label class="label3" for="email">Email address:</label>
        <input
          class="input3"
          type="text"
          name="email"
          id="email"
          placeholder="example@gmail.com"
        /></div>
        <label class="msg" for="textarea">Message</label>
        <textarea class="text" name="textarea" placeholder="Type Your Message"></textarea>
        
        <label class="button" for="button">Send Message</label>
      </form>
    </section></div>
  </body>
</html>
