<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div>
      <h1>Need any Help? Get In Touch</h1>
      <p>Open a ticket, we will get back to you ASAP!</p>
      <form action="#" method="post">
        <div>
          <br />
          <span>
            <label for="first name">First Name</label>
            <input
              type="text"
              id="first name"
              name="first name"
              placeholder="First Name"
            />
          </span>
          <span>
            <label for="last name">Last Name</label>
            <input
              type="text"
              id="last name"
              name="last name"
              placeholder="Last Name"
            />
          </span>
        </div>
        <br />
        <div>
          <label for="Email"> Email Address</label>
          <input
            type="email"
            id="Email"
            name="Email"
            placeholder="Email Address"
          />
        </div>
        <br />
        <div>
          <label for="Message"> Message</label>
          <textarea
            id="Message"
            name="Message"
            placeholder="Message"
            row="15"
            cols="15"
            ;
          >
          </textarea>
        </div>
        <br />
        <div>
          <button type="submit" id="Send Message" name="Send Message" ;>
            Send Message
          </button>
        </div>
      </form>
    </div>
  </body>
</html>
